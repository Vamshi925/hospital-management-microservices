spring.application.name=APPOINTMENT-SERVICE

# Database Connection
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/AppointmentService}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

logging.level.org.springframework=INFO
logging.level.org.hibernate=INFO

server.port=8041

# Server connection
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

spring.cloud.gateway.routes[0].id=appointment-service
spring.cloud.gateway.routes[0].uri=lb://APPOINTMENT-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/appointment-service/**
spring.cloud.gateway.routes[0].filters[0]=StripPrefix=1


management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
