spring.application.name=API-GATEWAY

server.port=8081

eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

eureka.instance.prefer-ip-address=true

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

spring.cloud.gateway.default-filters[0]=DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials RETAIN_FIRST

# ===========================
# Login Service
# ===========================
spring.cloud.gateway.routes[0].id=login-service
spring.cloud.gateway.routes[0].uri=lb://LOGIN-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/login-service/**
spring.cloud.gateway.routes[0].filters[0]=StripPrefix=1

# ===========================
# Doctor Service #
# ===========================
spring.cloud.gateway.routes[1].id=doctor-service
spring.cloud.gateway.routes[1].uri=lb://DOCTOR-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/doctor-service/**
spring.cloud.gateway.routes[1].filters[0]=StripPrefix=1

# ===========================
# Appointment Service
# ===========================
spring.cloud.gateway.routes[2].id=appointment-service
spring.cloud.gateway.routes[2].uri=lb://APPOINTMENT-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/appointment-service/**
spring.cloud.gateway.routes[2].filters[0]=StripPrefix=1

# ===========================
# Medical History Service
# ===========================
spring.cloud.gateway.routes[3].id=medical-history-service
spring.cloud.gateway.routes[3].uri=lb://MEDICAL-HISTORY-SERVICE
spring.cloud.gateway.routes[3].predicates[0]=Path=/medical-history-service/**
spring.cloud.gateway.routes[3].filters[0]=StripPrefix=1

# ===========================
# Notification Service 
# ===========================
spring.cloud.gateway.routes[4].id=notification-service
spring.cloud.gateway.routes[4].uri=lb://NOTIFICATION-SERVICE
spring.cloud.gateway.routes[4].predicates[0]=Path=/notification-service/**
spring.cloud.gateway.routes[4].filters[0]=StripPrefix=1
