spring.application.name=MEDICAL-HISTORY-SERVICE
server.port=8085

# Database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/MedicalHistoryService}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

logging.level.org.springframework=INFO
logging.level.org.hibernate=INFO

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

# Eureka
eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

spring.cloud.gateway.routes[0].id=medical-history-service
spring.cloud.gateway.routes[0].uri=lb://MEDICAL-HISTORY-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/medical-history-service/**
spring.cloud.gateway.routes[0].filters[0]=StripPrefix=1

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always
