name: Backend CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        service:
          - eureka-server
          - api-gateway
          - login-service
          - doctor-service
          - appointment-service
          - medical-history-service
          - notification-service

    defaults:
      run:
        working-directory: ${{ matrix.service }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Compile Services
        run: mvn clean package -DskipTests

      - name: Run Unit Tests
        run: mvn test

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service }}:latest \
            -t ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service }}:${{ github.sha }} \
            .

      - name: Run Trivy Image Scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service }}:${{ github.sha }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: 0

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service }}:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service }}:latest

  security:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=Vamshi925_hospital-management-microservices
            -Dsonar.organization=vamshi925
            -Dsonar.sources=.
            -Dsonar.java.binaries=**/target/classes

      - name: Run Snyk Scan
        uses: snyk/actions/maven@0.4.0
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --all-projects

      - name: Install OWASP Dependency Check
        run: |
          wget https://github.com/dependency-check/DependencyCheck/releases/download/v12.1.0/dependency-check-12.1.0-release.zip
          unzip -q dependency-check-12.1.0-release.zip

      - name: Run OWASP Dependency Check
        run: |
          ./dependency-check/bin/dependency-check.sh \
            --project "Hospital-Backend" \
            --scan . \
            --format HTML \
            --out reports \
            --disableOssIndex

      - name: Upload OWASP Report
        uses: actions/upload-artifact@v4
        with:
          name: backend-owasp-report
          path: reports

      - name: Run Trivy Filesystem Scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: CRITICAL,HIGH
          exit-code: 0

  deploy:
    needs:
      - build
      - security
    runs-on: ubuntu-latest

    steps:

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Start Auto Scaling Instance Refresh
      run: |
        aws autoscaling start-instance-refresh \
          --auto-scaling-group-name Hospital-App-ASG \
          --preferences '{
            "MinHealthyPercentage": 100,
            "InstanceWarmup": 300
          }'

    - name: Show Instance Refresh Status
      run: |
        aws autoscaling describe-instance-refreshes \
          --auto-scaling-group-name Hospital-App-ASG
