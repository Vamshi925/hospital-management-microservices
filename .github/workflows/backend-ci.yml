name: Backend CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        service:
          - eureka-server
          - api-gateway
          - login-service
          - doctor-service
          - appointment-service
          - medical-history-service
          - notification-service

    defaults:
      run:
        working-directory: ${{ matrix.service }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build ${{ matrix.service }}
        run: mvn clean package -DskipTests
      - name: Build Docker Image
        run: |
          docker build \
            -t hospital/${{ matrix.service }}:latest \
            .
