name: Backend CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        service:
          - eureka-server
          - api-gateway
          - login-service
          - doctor-service
          - appointment-service
          - medical-history-service
          - notification-service

    defaults:
      run:
        working-directory: ${{ matrix.service }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Compile Services
        run: mvn clean compile -DskipTests

      - name: Run Unit Tests
        run: mvn test
        
      - name: Cache OWASP Database
        uses: actions/cache@v4
        with:
         path: ~/.m2/repository/org/owasp
         key: ${{ runner.os }}-owasp-${{ hashFiles('**/pom.xml') }}
         restore-keys: |
           ${{ runner.os }}-owasp-

      - name: OWASP Dependency Check
        run: |
          mvn org.owasp:dependency-check-maven:check
          
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service }}:latest .

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service }}:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/hospital-devops

            git pull origin main

            cd compose

            docker compose pull

            docker compose up -d --remove-orphans

            docker image prune -f
